name = "homegrade-site"
main = "src/worker.ts"
compatibility_date = "2026-05-09"
compatibility_flags = ["global_fetch_strictly_public"]

routes = [
  { pattern = "homegrade.kr", custom_domain = true },
  { pattern = "www.homegrade.kr", custom_domain = true }
]

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true
